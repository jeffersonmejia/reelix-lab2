<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- METADATA -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- OG: PREVIEW -->
    <meta property="og:title" content="Reelix" />
    <meta
      property="og:description"
      content="Disfruta de tus series y películas favoritas"
    />
    <meta
      property="og:image"
      content="https://jeffersonmejia.github.io/reelix-app/img/og-preview.png"
    />
    <meta
      property="og:url"
      content="https://jeffersonmejia.github.io/reelix-app/"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reelix" />
    <!-- TITLE, FAVICON -->
    <title>Reelix: series y películas online</title>
    <link
      rel="shortcut icon"
      href="img/icons/favicon.ico"
      type="image/x-icon"
    />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- STYLES -->
    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li>
          <img src="img/icons/logo.svg" alt="logo" class="logo" />
        </li>
        <li>
          <a href="signup.html">Registrarse</a>
        </li>
        <li>
          <button class="btn-primary">
            <a href="signin.html">Ingresar</a>
          </button>
        </li>
      </ul>
    </nav>
    <header>
      <figure>
        <img src="img/cover.png" alt="cover-header" />
        <figcaption>
          <p>
            Adolescentes enfrentan el dolor y el silencio para revelar la
            verdad.
          </p>
          <h1>
            <span> Todo parece </span>
            <span>Más díficil.</span>
          </h1>
        </figcaption>
      </figure>
      <video
        id="myVideo"
        src="video/13_reasons_trailer.mp4"
        muted
        controls
        preload="auto"
        playsinline
        class=""
      ></video>

      <small class="counter"></small>
    </header>
    <main>
      <section>
        <h2>Top 10 Ecuador</h2>
        <!-- MOVIES -->
        <article class="movie-box">
          <figure>
            <img src="img/movies/portada1.png" alt="Portada de Spider-Man" />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>Spider-Man</h3>
              <p>
                El joven Peter Parker adquiere habilidades arácnidas y lucha
                contra el crimen en Nueva York.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img src="img/movies/portada2.png" alt="Portada de Hulk" />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>Hulk</h3>
              <p>
                Después de un experimento fallido, Bruce Banner se transforma en
                un enorme ser verde lleno de furia.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img
              src="img/movies/portada3.png"
              alt="Portada de Rápidos y Furiosos"
            />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>Rápidos y Furiosos</h3>
              <p>
                Una saga llena de acción, autos veloces y misiones imposibles
                alrededor del mundo.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img
              src="img/movies/portada4.png"
              alt="Portada de The Last of Us"
            />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>The Last of Us</h3>
              <p>
                En un mundo postapocalíptico, Joel y Ellie luchan por sobrevivir
                y encontrar esperanza.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>

        <article class="movie-box">
          <figure>

            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>No respires</h3>
              <p>
                Un grupo de jóvenes intenta robar en la casa de un ciego, pero
                no todo es lo que parece.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img
              src="img/movies/portada6.png"
              alt="Portada de Cosmos: Mundos Posibles"
            />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>Cosmos: Mundos Posibles</h3>
              <p>
                Un viaje fascinante a través del universo y la historia de la
                ciencia.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img
              src="img/movies/portada7.png"
              alt="Portada de La teoría del todo"
            />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>La teoría del todo</h3>

                La inspiradora historia del físico Stephen Hawking y su lucha

              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img src="img/movies/portada8.png" alt="Portada de It" />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>It (Eso)</h3>
              <p>
                Un grupo de niños enfrenta a un mal antiguo que toma la forma de

              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>

        <article class="movie-box">
          <figure>
            <img
              src="img/movies/portada9.png"
              alt="Portada de Esta abuela es un peligro"
            />
            <figcaption>
              <small class="movie-duration">01:12:00</small>
              <h3>Esta abuela es un peligro</h3>
              <p>
                Un agente del FBI se disfraza de abuela para atrapar a un
                criminal.
              </p>
              <small>$15.00 </small>
            </figcaption>
          </figure>
          <button class="btn-primary">Alquilar</button>
        </article>
      </section>
    </main>
    <footer>
      <small>Reelix 2025 ©</small>
    </footer>
    <script src="js/index.js"></script>

</html>
