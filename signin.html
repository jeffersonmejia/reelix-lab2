<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- METADATA -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TITLE, FAVICON -->
    <title>Reelix: Iniciar sesión</title>
    <link
      rel="shortcut icon"
      href="img/icons/favicon.ico"
      type="image/x-icon"
    />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- STYLES -->
    <link rel="stylesheet" href="styles/signin.css" />
  </head>
  <body>
    <!-- LOGIN FORM -->
    <form class="formulario translated-box" action="content/for_you.html">
      <!-- TITLE FORM -->
      <legend>
        <figure>
          <img src="img/icons/logo.svg" alt="logo" class="logo" />
          <h2>Iniciar sesión</h2>
        </figure>
      </legend>
      <!-- INPUTS CONTAINER -->
      <fieldset>
        <input type="Correo" placeholder="Correo o número de celular" />
        <input type="Contrasena" placeholder="Contraseña" />
        <input type="submit" value="Iniciar Sesión" class="boton-inicio" />
        <p>O</p>
        <a href="./index.html" class="back-btn"><small>Volver</small></a>
      </fieldset>
    </form>
    <!-- SECURITY ARTICLE -->
    <article class="politicas translated-box">
      <h2>Tu plataforma de contenido streaming</h2>
      <ul>
        <li>Accede a contenido de calidad</li>
        <li>Suscríbete a nuestros planes más accesibles</li>
        <li>Conoce los nuevos estrenos y míralos en exclusivo</li>
      </ul>
      <section class="grid-new-movies">
        <img src="img/movies/portada1.jpg" alt="" class="cover" />
        <img src="img/movies/portada2.jpeg" alt="" />
        <img src="img/movies/portada3.jpg" alt="" />
      </section>
      <small>Reelix 2025</small>
    </article>
  </body>
  <script src="js/signin.js"></script>
</html>
