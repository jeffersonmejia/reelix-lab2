<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogIn</title>
    <link
      rel="shortcut icon"
      href="img/icons/favicon.ico"
      type="image/x-icon"
    />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/signin.css" />
  </head>
  <body>
    <main>
      <figure>
        <img src="img/cover-login.png" alt="cover login" />
        <figcaption>
          <ul>
            <li></li>
          </ul>
        </figcaption>
      </figure>
      <form action="content/for_you.html">
        <legend>LogIn</legend>
        <fieldset>
          <input type="text" placeholder="Correo" required />
          <input type="password" placeholder="Contraseña" required />
          <input type="submit" value="Ingresar" />
          <a href="/">Volver</a>
        </fieldset>
      </form>
    </main>
  </body>
</html>
